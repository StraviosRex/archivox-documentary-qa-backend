<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Archivox</title>

  <script>
    const saved = localStorage.getItem("theme");
    if (saved) document.documentElement.setAttribute("data-theme", saved);
  </script>

  <style>
    :root {
      --bg:               #f4f1ea;
      --text:             #2f241d;
      --container-bg:     #fffaf2;
      --container-border: #d7c7aa;
      --subtitle:         #6c5a47;
      --input-border:     #c4b394;
      --input-bg:         #fff;
      --btn-bg:           #5c3d2e;
      --btn-color:        #fff;
      --btn-disabled:     #9b8977;
      --box-bg:           #fff;
      --box-border:       #d7c7aa;
      --source-accent:    #8a6642;
      --source-bg:        #f9f3e8;
      --timestamp:        #4a3325;
      --status:           #6c5a47;
      --error:            #9b1c1c;
      --meta-label:       #4a3325;
    }

    [data-theme="dark"] {
      --bg:               #1a1410;
      --text:             #e8ddd0;
      --container-bg:     #2a1f17;
      --container-border: #4a3828;
      --subtitle:         #a08878;
      --input-border:     #4a3828;
      --input-bg:         #231a13;
      --btn-bg:           #8a5a3c;
      --btn-color:        #fff;
      --btn-disabled:     #4a3828;
      --box-bg:           #231a13;
      --box-border:       #4a3828;
      --source-accent:    #a07050;
      --source-bg:        #2f2018;
      --timestamp:        #c8a888;
      --status:           #a08878;
      --error:            #e05555;
      --meta-label:       #c8a888;
    }

    body {
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 0;
      transition: background 0.2s, color 0.2s;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      padding: 24px;
      background: var(--container-bg);
      border: 1px solid var(--container-border);
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
      transition: background 0.2s, border-color 0.2s;
    }

    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0;
    }

    h1 {
      margin: 0;
      font-size: 32px;
    }

    .theme-toggle {
      background: none;
      border: 1px solid var(--container-border);
      border-radius: 6px;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 18px;
      color: var(--text);
      line-height: 1;
      margin: 0;
      transition: border-color 0.2s;
    }

    .theme-toggle:hover {
      border-color: var(--source-accent);
    }

    .subtitle {
      color: var(--subtitle);
      margin-bottom: 24px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
    }

    select,
    textarea,
    button {
      font: inherit;
    }

    select {
      width: 100%;
      padding: 10px;
      margin-bottom: 16px;
      border: 1px solid var(--input-border);
      border-radius: 8px;
      background: var(--input-bg);
      color: var(--text);
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }

    textarea {
      width: 100%;
      min-height: 110px;
      padding: 12px;
      border: 1px solid var(--input-border);
      border-radius: 8px;
      resize: vertical;
      box-sizing: border-box;
      background: var(--input-bg);
      color: var(--text);
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }

    button.ask-btn {
      margin-top: 12px;
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      background: var(--btn-bg);
      color: var(--btn-color);
      cursor: pointer;
      transition: background 0.2s;
    }

    button.ask-btn:disabled {
      background: var(--btn-disabled);
      cursor: not-allowed;
    }

    .answer-box,
    .sources-box,
    .meta-box {
      margin-top: 24px;
      padding: 16px;
      border: 1px solid var(--box-border);
      border-radius: 10px;
      background: var(--box-bg);
      transition: background 0.2s, border-color 0.2s;
    }

    .answer-box h2,
    .sources-box h2,
    .meta-box h2 {
      margin-top: 0;
      font-size: 20px;
    }

    .answer {
      white-space: pre-wrap;
      line-height: 1.5;
    }

    .source {
      padding: 12px;
      border-left: 4px solid var(--source-accent);
      background: var(--source-bg);
      margin-bottom: 12px;
      border-radius: 6px;
      transition: background 0.2s;
    }

    .timestamp {
      font-weight: bold;
      margin-bottom: 6px;
      color: var(--timestamp);
    }

    .excerpt {
      line-height: 1.45;
    }

    .status {
      margin-top: 12px;
      color: var(--status);
    }

    .error {
      color: var(--error);
      font-weight: bold;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 8px;
      font-size: 14px;
    }

    .meta-label {
      font-weight: bold;
      color: var(--meta-label);
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header-row">
      <h1>Archivox</h1>
      <button class="theme-toggle" id="themeToggle" title="Toggle dark mode">🌙</button>
    </div>
    <p class="subtitle">
      Let's talk to your transcript with grounded details!
    </p>

    <label for="profileSelect">Model profile</label>
    <select id="profileSelect">
      <option value="">Loading profiles...</option>
    </select>
    <p class="subtitle" style="margin-top:6px;font-size:0.8em;">If Ollama is running locally, your installed models will appear here automatically.</p>

    <label for="questionInput">Question</label>
    <textarea id="questionInput" placeholder="Let's talk to your transcript with grounded details!"></textarea>

    <button class="ask-btn" id="askButton">Ask</button>

    <div id="status" class="status"></div>

    <div id="answerBox" class="answer-box hidden">
      <h2>Answer</h2>
      <div id="answer" class="answer"></div>
    </div>

    <div id="sourcesBox" class="sources-box hidden">
      <h2>Sources — ranked by relevance</h2>
      <div id="sources"></div>
    </div>

    <div id="metaBox" class="meta-box hidden">
      <h2>Model Used</h2>
      <div class="meta-grid">
        <div class="meta-label">Profile</div>
        <div id="metaProfile"></div>

        <div class="meta-label">Provider</div>
        <div id="metaProvider"></div>

        <div class="meta-label">Requested model</div>
        <div id="metaModel"></div>

        <div class="meta-label">Actual model</div>
        <div id="metaModelUsed"></div>
      </div>
    </div>
  </div>

  <script>
    const profileSelect = document.getElementById("profileSelect");
    const questionInput = document.getElementById("questionInput");
    const askButton = document.getElementById("askButton");
    const statusEl = document.getElementById("status");
    const themeToggle = document.getElementById("themeToggle");

    const metaBox = document.getElementById("metaBox");
    const metaProfile = document.getElementById("metaProfile");
    const metaProvider = document.getElementById("metaProvider");
    const metaModel = document.getElementById("metaModel");
    const metaModelUsed = document.getElementById("metaModelUsed");

    const answerBox = document.getElementById("answerBox");
    const answerEl = document.getElementById("answer");

    const sourcesBox = document.getElementById("sourcesBox");
    const sourcesEl = document.getElementById("sources");

    function applyTheme(theme) {
      document.documentElement.setAttribute("data-theme", theme);
      themeToggle.textContent = theme === "dark" ? "☀️" : "🌙";
      themeToggle.title = theme === "dark" ? "Switch to light mode" : "Switch to dark mode";
      localStorage.setItem("theme", theme);
    }

    const initialTheme = document.documentElement.getAttribute("data-theme") || "light";
    applyTheme(initialTheme);

    themeToggle.addEventListener("click", () => {
      const current = document.documentElement.getAttribute("data-theme");
      applyTheme(current === "dark" ? "light" : "dark");
    });

    function setStatus(message, isError = false) {
      statusEl.textContent = message;
      statusEl.className = isError ? "status error" : "status";
    }

    function clearResults() {
      answerBox.classList.add("hidden");
      sourcesBox.classList.add("hidden");
      metaBox.classList.add("hidden");

      answerEl.textContent = "";
      sourcesEl.innerHTML = "";

      metaProfile.textContent = "";
      metaProvider.textContent = "";
      metaModel.textContent = "";
      metaModelUsed.textContent = "";
    }

    async function loadProfiles() {
      try {
        const response = await fetch("/profiles");

        if (!response.ok) {
          throw new Error("Failed to load model profiles.");
        }

        const data = await response.json();

        profileSelect.innerHTML = "";

        for (const profile of data.profiles) {
          const option = document.createElement("option");
          option.value = profile.id;
          option.textContent = `${profile.label} (${profile.provider})`;

          if (profile.id === data.default_profile) {
            option.selected = true;
          }

          profileSelect.appendChild(option);
        }

        setStatus("");
      } catch (error) {
        profileSelect.innerHTML = "";
        const option = document.createElement("option");
        option.value = "";
        option.textContent = "Default model profile";
        profileSelect.appendChild(option);

        setStatus("Could not load model profiles. Default backend profile will be used.", true);
      }
    }

    function renderMeta(data) {
      if (!data.profile && !data.provider && !data.model && !data.model_used) {
        metaBox.classList.add("hidden");
        return;
      }

      metaProfile.textContent = data.profile || "N/A";
      metaProvider.textContent = data.provider || "N/A";
      metaModel.textContent = data.model || "N/A";
      metaModelUsed.textContent = data.model_used || "N/A";

      metaBox.classList.remove("hidden");
    }

    function renderAnswer(answer) {
      answerEl.textContent = answer;
      answerBox.classList.remove("hidden");
    }

    function renderSources(sources) {
      sourcesEl.innerHTML = "";

      if (!sources || sources.length === 0) {
        sourcesBox.classList.add("hidden");
        return;
      }

      for (let i = 0; i < sources.length; i++) {
        const source = sources[i];
        const sourceDiv = document.createElement("div");
        sourceDiv.className = "source";

        const timestampDiv = document.createElement("div");
        timestampDiv.className = "timestamp";
        timestampDiv.innerHTML = `${i + 1}.&nbsp;&nbsp;${source.timestamp}`;

        const excerptDiv = document.createElement("div");
        excerptDiv.className = "excerpt";
        excerptDiv.textContent = source.excerpt;

        sourceDiv.appendChild(timestampDiv);
        sourceDiv.appendChild(excerptDiv);
        sourcesEl.appendChild(sourceDiv);
      }

      sourcesBox.classList.remove("hidden");
    }

    async function askQuestion() {
      const question = questionInput.value.trim();
      const profile = profileSelect.value;

      if (!question) {
        setStatus("Please enter a question.", true);
        return;
      }

      clearResults();
      setStatus("Thinking...");
      askButton.disabled = true;

      try {
        const response = await fetch("/ask", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            question,
            profile: profile || null,
          }),
        });

        if (!response.ok) {
          const errorText = await response.text();
          throw new Error(errorText || "Request failed.");
        }

        const data = await response.json();

        renderAnswer(data.answer);
        renderSources(data.sources);
        renderMeta(data);

        setStatus("");
      } catch (error) {
        clearResults();
        setStatus(`Error: ${error.message}`, true);
      } finally {
        askButton.disabled = false;
      }
    }

    askButton.addEventListener("click", askQuestion);

    questionInput.addEventListener("keydown", (event) => {
      if (event.ctrlKey && event.key === "Enter") {
        askQuestion();
      }
    });

    loadProfiles();
  </script>
</body>
</html>
