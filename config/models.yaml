profiles:
  openrouter_free_router:
    label: "OpenRouter - Free Router"
    provider: openrouter
    model: openrouter/free
    base_url: https://openrouter.ai/api/v1
    api_key_env: OPENROUTER_API_KEY

  openrouter_llama_free:
    label: "OpenRouter - Llama 3.3 70B Free"
    provider: openrouter
    model: meta-llama/llama-3.3-70b-instruct:free
    base_url: https://openrouter.ai/api/v1
    api_key_env: OPENROUTER_API_KEY
    fallback_models:
      - deepseek/deepseek-r1:free
      - qwen/qwen3-coder:free
      - openrouter/free

  openrouter_deepseek_free:
    label: "OpenRouter - DeepSeek R1 Free"
    provider: openrouter
    model: deepseek/deepseek-r1:free
    base_url: https://openrouter.ai/api/v1
    api_key_env: OPENROUTER_API_KEY
    fallback_models:
      - qwen/qwen3-coder:free
      - meta-llama/llama-3.3-70b-instruct:free
      - openrouter/free

  openrouter_qwen_free:
    label: "OpenRouter - Qwen Coder Free"
    provider: openrouter
    model: qwen/qwen3-coder:free
    base_url: https://openrouter.ai/api/v1
    api_key_env: OPENROUTER_API_KEY
    fallback_models:
      - deepseek/deepseek-r1:free
      - meta-llama/llama-3.3-70b-instruct:free
      - openrouter/free

  groq_llama8b:
    label: "Groq - Llama 8B"
    provider: groq
    model: llama-3.1-8b-instant
    base_url: https://api.groq.com/openai/v1
    api_key_env: GROQ_API_KEY

  groq_llama70b:
    label: "Groq - Llama 70B"
    provider: groq
    model: llama-3.3-70b-versatile
    base_url: https://api.groq.com/openai/v1
    api_key_env: GROQ_API_KEY

  gemini_flash:
    label: "Google Gemini Flash"
    provider: gemini
    model: gemini-2.5-flash
    base_url: https://generativelanguage.googleapis.com/v1beta/openai/
    api_key_env: GEMINI_API_KEY

  ollama_llama32_3b:
    label: "Ollama - Llama 3.2 3B Local"
